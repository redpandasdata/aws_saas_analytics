version: 2

sources:
  - name: aws_sales_saas
    database: sam-dafs-16
    schema: aws_sales_saas
    description: Raw sales data from AWS SaaS dataset
    tables:
      - name: aws_sales

models:

  - name: mart_customer_summary
    description: Customer level metrics used for customer analytics dashboard
    columns:

      - name: customer_name
        description: Unique identifier of the customer
        tests:
          - not_null

      - name: total_sales
        description: Total revenue generated by the customer
        tests:
          - not_null

  - name: mart_sales_summary
    description: Monthly revenue and customer metrics used for the sales dashboard
    columns:

      - name: revenue_month
        description: Total monthly revenue
        tests:
          - not_null

      - name: year
        tests:
          - not_null

      - name: month
        tests:
          - not_null