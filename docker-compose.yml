# docker-compose.yml
version: "3.9"

services:
  saas_analytics:
    build: .
    container_name: saas_analytics
    ports:
      - "8501:8501"          # Mapping port hôte → conteneur
    volumes:
      - .:/app               # Synchronisation code local ↔ conteneur
    command: >
      streamlit run app.py
      --server.address=0.0.0.0
      --server.port=8501
      --server.headless=true